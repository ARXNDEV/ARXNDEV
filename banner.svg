<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.10"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1200" height="300" fill="url(#fade)"/>
  <!-- signature: dotted packet field on the right -->
  <rect x="760" y="0" width="440" height="300" fill="url(#dots)"/>
  <rect x="760" y="0" width="1" height="300" fill="#ffffff" fill-opacity="0.08"/>

  <!-- eyebrow -->
  <text x="70" y="88" fill="#8a8a8a" font-size="15" letter-spacing="6">ACCOPS SYSTEMS &#160;/&#160; REMOTE BROWSER ISOLATION</text>

  <!-- name -->
  <text x="66" y="176" fill="#ffffff" font-size="92" font-weight="700" letter-spacing="2">ARUN KUMAR</text>

  <!-- hairline rule -->
  <rect x="70" y="200" width="620" height="2" fill="url(#rule)"/>

  <!-- role line with blinking cursor -->
  <text x="70" y="246" fill="#c4c4c4" font-size="21" letter-spacing="1">Full Stack &#183; AI/ML &#183; Security Engineer</text>
  <rect x="512" y="228" width="13" height="24" fill="#ffffff">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- prompt marker -->
  <text x="70" y="284" fill="#5f5f5f" font-size="14" letter-spacing="2">~/arxndev $ build --secure --ship</text>

</svg>
